<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>SACS — {{ client.label }} — {{ report.report_date }}</title>
<link rel="stylesheet" href="{{ pdf_css_path }}">
</head><body>

<div class="report-header">
  <div class="left">Simple Automated Cashflow System</div>
  <div class="right">{{ report.report_date }}</div>
</div>

<h1 class="report-title" style="text-align:center; font-size:20pt; font-weight:700; color:#000000; margin:0 0 8pt;">Simple Automated Cashflow System (SACS)</h1>
<div class="client-banner">{{ client.client1_name }}{% if client.is_married %} &amp; {{ client.client2_name }}{% endif %}</div>

<!-- =================== PAGE 1: bubble diagram =================== -->
<div class="sacs-page1">
  <svg viewBox="0 0 720 720" xmlns="http://www.w3.org/2000/svg">
    <!-- top icons -->
    <text x="20"  y="58" font-size="50" fill="#16a34a">$</text>
    <text x="660" y="54" font-size="50" fill="#6b7280">🏢</text>

    {% if client.is_married %}
    <text x="20" y="92"  fill="#32CD32" font-size="11" font-weight="700">${{ "{:,.0f}".format(client.client1_salary or 0) }} - {{ client.client1_name }}</text>
    <text x="20" y="110" fill="#32CD32" font-size="11" font-weight="700">${{ "{:,.0f}".format(client.client2_salary or 0) }} - {{ client.client2_name }}</text>
    {% else %}
    <text x="20" y="92"  fill="#32CD32" font-size="11" font-weight="700">${{ "{:,.0f}".format(client.client1_salary or client.monthly_salary or 0) }} - {{ client.client1_name }}</text>
    {% endif %}

    <!-- Green paint arrow into INFLOW -->
    <g transform="translate(45 120) rotate(55)">
      <polygon points="0,-9 36,-9 36,-18 60,0 36,18 36,9 0,9"
               fill="#32CD32" stroke="black" stroke-width="2"/>
    </g>

    <!-- X = Monthly Expenses label -->
    <text x="660" y="90"  fill="#333" font-size="11" font-weight="600" text-anchor="end">X = Monthly</text>
    <text x="660" y="105" fill="#333" font-size="11" font-weight="600" text-anchor="end">Expenses</text>

    <defs>
      <marker id="arrow-black" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
      </marker>
    </defs>

    <!-- ============== INFLOW bubble (cx=160) ============== -->
    <circle cx="160" cy="250" r="110" fill="#16a34a" stroke="black" stroke-width="1.5"/>
    <text class="sacs-bubble-label" x="160" y="225" style="fill:#ffffff;" text-anchor="middle">INFLOW</text>
    <rect x="85" y="250" width="150" height="28" fill="white"/>
    <text class="sacs-bubble-amount" x="160" y="272" style="fill:#16a34a;" text-anchor="middle">{{ "${:,.0f}".format(sacs.inflow) }}</text>
    <line x1="70" y1="315" x2="250" y2="315" stroke="black" stroke-width="1.5"/>
    <text x="160" y="345" fill="black" font-size="11" text-anchor="middle" font-weight="600">$1,000 floor</text>

    <!-- ============== OUTFLOW bubble (cx=560) ============== -->
    <circle cx="560" cy="250" r="110" fill="#dc2626" stroke="black" stroke-width="1.5"/>
    <path d="M 660 115 L 660 264 L 645 264"
          stroke="#333" stroke-width="1.4" fill="none" marker-end="url(#arrow-black)"/>
    <text class="sacs-bubble-label" x="560" y="225" style="fill:#ffffff;" text-anchor="middle">OUTFLOW</text>
    <rect x="485" y="250" width="150" height="28" fill="white"/>
    <text class="sacs-bubble-amount" x="560" y="272" style="fill:#dc2626;" text-anchor="middle">{{ "${:,.0f}".format(sacs.outflow) }}</text>
    <line x1="470" y1="315" x2="650" y2="315" stroke="black" stroke-width="1.5"/>
    <text x="560" y="345" fill="black" font-size="11" text-anchor="middle" font-weight="600">$1,000 floor</text>

    <!-- ============== Red arrow between them ============== -->
    <polygon points="285,205 420,205 420,193 445,220 420,247 420,235 285,235"
             fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="352" y="225" text-anchor="middle"
          fill="#dc2626" font-size="14" font-weight="700">X = {{ "${:,.0f}".format(sacs.outflow) }}/mo</text>

    <!-- ============== Blue L-arrow into PRIVATE RESERVE ============== -->
    <path d="M 130 370 L 180 370 L 180 465 L 225 465 L 225 450 L 248 490 L 225 530 L 225 515 L 130 515 Z"
          fill="none" stroke="#1E90FF" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="183" y="498" text-anchor="middle"
          fill="#1E90FF" font-size="14" font-weight="700">{{ "${:,.0f}".format(sacs.excess) }}/mo*</text>

    <!-- ============== PRIVATE RESERVE bubble (cx=360, cy=505, r=110) ============== -->
    <circle cx="360" cy="505" r="110" fill="#1E90FF" stroke="black" stroke-width="1.5"/>
    <text class="sacs-bubble-label"  x="360" y="490" style="fill:#ffffff;" text-anchor="middle">PRIVATE</text>
    <text class="sacs-bubble-label"  x="360" y="510" style="fill:#ffffff;" text-anchor="middle">RESERVE</text>

    <!-- Piggy image -->
    <image href="{{ piggy_path }}" x="310" y="535" width="100" height="80" preserveAspectRatio="xMidYMid meet"/>

    <!-- Dotted line below bubble down to caption -->
    <line x1="360" y1="620" x2="360" y2="705"
          stroke="#555" stroke-width="1.5" stroke-dasharray="3,4"/>

    <text x="365" y="650" text-anchor="middle" font-weight="500" font-size="12pt" fill="#555" letter-spacing="4">MONTHLY CASHFLOW</text>
  </svg>
</div>

<!-- =================== PAGE 2: long-term cashflow =================== -->
<h2 style="text-align:center; font-size:20pt; font-weight:700; color:#000000; margin:0 0 8pt;">
  Simple Automated Cashflow System (SACS)
</h2>

<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dotted line aligned with page 1's, from top of SVG down to the arrow -->
  <line x1="360" y1="10" x2="360" y2="170"
        stroke="#555" stroke-width="1.5" stroke-dasharray="3,4"/>

  <!-- ============== PRIVATE RESERVE bubble (cx=180, cy=180, r=115) ============== -->
  <circle cx="180" cy="180" r="115" fill="#60a5fa" stroke="black" stroke-width="1.5"/>
  <text class="sacs-bubble-label" x="180" y="115" style="fill:#ffffff;" text-anchor="middle">PRIVATE</text>
  <text class="sacs-bubble-label" x="180" y="138" style="fill:#ffffff;" text-anchor="middle">RESERVE</text>
  <rect x="105" y="155" width="150" height="28" fill="white"/>
  <text class="sacs-bubble-amount" x="180" y="176" style="fill:#60a5fa;" font-size="16pt" text-anchor="middle">{{ "${:,.0f}".format(sacs.private_reserve_balance) }}</text>
  <line x1="82" y1="240" x2="278" y2="240" stroke="black" stroke-width="1.5"/>
  <text x="180" y="265" fill="black" font-size="11" text-anchor="middle" font-weight="600">Target: {{ "${:,.0f}".format(sacs.private_reserve_target) }}</text>

  <!-- ============== Bidirectional fat arrow (centered between bubbles at x=360) ============== -->
  <polygon points="295,180 320,158 320,170 400,170 400,158 425,180 400,202 400,190 320,190 320,202"
  fill="#60a5fa" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- ============== INVESTMENT ACCOUNT bubble (cx=540, cy=180, r=115) ============== -->
  <circle cx="540" cy="180" r="115" fill="#1e3a8a" stroke="black" stroke-width="1.5"/>
  <text class="sacs-bubble-label" x="540" y="115" style="fill:#ffffff;" text-anchor="middle">INVESTMENT</text>
  <text class="sacs-bubble-label" x="540" y="138" style="fill:#ffffff;" text-anchor="middle">ACCOUNT</text>
  <rect x="465" y="155" width="150" height="28" fill="white"/>
  <text class="sacs-bubble-amount" x="540" y="176" style="fill:#1e3a8a;" font-size="16pt" text-anchor="middle">{{ "${:,.0f}".format(sacs.investment_account_balance) }}</text>
  <text x="540" y="320" font-size="8pt" fill="#000" text-anchor="middle">Remainder</text>

  <!-- ============== Formula under Private Reserve bubble (8pt, black) ============== -->
  {% if client.private_reserve_target_override %}
  <text x="180" y="315" text-anchor="middle" font-size="8pt" fill="#000">Manual override</text>
  {% else %}
  <text x="180" y="315" text-anchor="middle" font-size="8pt" fill="#000">
    Target = 6 × monthly expenses (${{ "{:,.0f}".format(client.monthly_expense_budget) }})
  </text>
  {% if deductibles %}
  <text x="180" y="330" text-anchor="middle" font-size="8pt" fill="#000">
    + deductibles ({% for d in deductibles %}{{ d.label }} ${{ "{:,.0f}".format(d.amount) }}{% if not loop.last %} + {% endif %}{% endfor %})
  </text>
  {% endif %}
  {% endif %}
  <text x="180" y="350" text-anchor="middle" font-size="8pt" fill="#000" font-weight="600">
    Progress to target: {{ "%.0f"|format(100 * (sacs.private_reserve_balance / sacs.private_reserve_target) if sacs.private_reserve_target else 0) }}%
  </text>
</svg>

<!-- Long-term cashflow heading -->
<div style="text-align:center; margin-top:14pt;">
  <div style="color:#000; font-size:16pt; font-weight:700; letter-spacing:1pt;">
    LONG CASH FLOW
  </div>
  <div style="color:#60a5fa; font-size:11pt; font-weight:600; text-transform:uppercase; letter-spacing:0.5pt; margin-top:4pt;">
    (MAGNIFIED PRIVATE RESERVE CASHFLOW)
  </div>
</div>
</body></html>
